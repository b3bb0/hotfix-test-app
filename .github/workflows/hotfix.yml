name: 🔁 Test Hotfix Flow

on:
  pull_request:
    types: [opened, edited, synchronize]
    branches:
      - master
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-meta:
    runs-on: ubuntu-latest

    steps:
      - name: 🔑 Set up GitHub CLI
        uses: cli/gh-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🚦 Sync Metadata from PR
        uses: b3bb0/sync-hotfix-meta@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

  handle-hotfix:
    needs: sync-meta
    if: startsWith(github.head_ref, 'hotfix/')
    uses: b3bb0/action-hotfix-handler/.github/workflows/hotfix-handler.yml@v1
    with:
      pr_number: ${{ github.event.pull_request.number }}
      pr_title: ${{ github.event.pull_request.title }}
      source_branch: ${{ github.head_ref }}
      merge_mode: ${{ fromJSON(github.event.pull_request.body).merge_mode }}
      tag: ${{ fromJSON(github.event.pull_request.body).tag }}
      branches: ${{ fromJSON(github.event.pull_request.body).branches }}

